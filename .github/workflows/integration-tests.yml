name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Verify data files exist
      run: |
        echo "Checking for required data files..."
        ls -la src/tprm_frameworks_mcp/data/
        test -f src/tprm_frameworks_mcp/data/sig_lite.json
        test -f src/tprm_frameworks_mcp/data/caiq_v4.json
        test -f src/tprm_frameworks_mcp/data/dora_ict_tpp.json
        test -f src/tprm_frameworks_mcp/data/nis2_supply_chain.json
        echo "✓ All required data files present"

    - name: Run golden contract tests
      run: |
        pytest tests/test_golden.py -v --tb=short

    - name: Run fast integration tests
      run: |
        pytest tests/ -v -m "not slow" --tb=short --junit-xml=junit-fast.xml

    - name: Run full integration tests
      run: |
        pytest tests/ -v --tb=short --junit-xml=junit-full.xml --cov=tprm_frameworks_mcp --cov-report=xml --cov-report=term-missing

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-py${{ matrix.python-version }}
        path: junit-*.xml

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: integration
        fail_ci_if_error: false

  phase0-validation:
    name: Phase 0 Deployment Validation
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run Phase 0 validation tests
      run: |
        pytest tests/integration_test.py::TestPhase0Validation -v --tb=short

    - name: Run complete Salesforce DORA scenario
      run: |
        pytest tests/integration_test.py::TestSalesforceDoraScenario -v -s --tb=short

    - name: Verify all 16 tools are operational
      run: |
        pytest tests/integration_test.py::TestMCPToolAvailability -v --tb=short

    - name: Create deployment badge
      if: success()
      run: |
        echo "✓ Phase 0 Validated" > phase0-status.txt

    - name: Upload validation status
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: phase0-validation
        path: phase0-status.txt
